<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="50%" style="stop-color:#1a1033"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="200" cy="100" r="200" fill="url(#orb1)"/>
  <circle cx="900" cy="300" r="250" fill="url(#orb2)"/>
  <circle cx="600" cy="200" r="300" fill="url(#orb1)" opacity="0.5"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- Connection lines from center to nodes -->
  <!-- PM node to Lore -->
  <line x1="280" y1="200" x2="520" y2="200" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <!-- Lore to Dev nodes -->
  <line x1="680" y1="200" x2="880" y2="120" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="680" y1="200" x2="880" y2="200" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="680" y1="200" x2="880" y2="280" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>

  <!-- Animated dots on lines -->
  <circle r="3" fill="#a78bfa" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M280,200 L520,200"/>
  </circle>
  <circle r="3" fill="#a78bfa" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M680,200 L880,120"/>
  </circle>
  <circle r="3" fill="#a78bfa" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M680,200 L880,200"/>
  </circle>
  <circle r="3" fill="#a78bfa" opacity="0.8">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M680,200 L880,280"/>
  </circle>

  <!-- PM Node -->
  <g filter="url(#soft-glow)">
    <circle cx="240" cy="200" r="40" fill="#1a1033" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <text x="240" y="195" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="22">PM</text>
    <text x="240" y="215" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="10" opacity="0.7">writes once</text>
  </g>

  <!-- Central Lore Node -->
  <g filter="url(#text-glow)">
    <rect x="520" y="155" width="160" height="90" rx="12" fill="#1a1033" stroke="url(#glow)" stroke-width="2"/>
    <text x="600" y="193" text-anchor="middle" fill="#e2d9f3" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold">Lore</text>
    <text x="600" y="215" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="11">shared context</text>
    <text x="600" y="233" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="11">via MCP</text>
  </g>

  <!-- Dev Nodes -->
  <g filter="url(#soft-glow)">
    <!-- Dev A -->
    <circle cx="920" cy="120" r="35" fill="#1a1033" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
    <text x="920" y="115" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="13">Claude</text>
    <text x="920" y="132" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Dev A</text>

    <!-- Dev B -->
    <circle cx="920" cy="200" r="35" fill="#1a1033" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
    <text x="920" y="195" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="13">Claude</text>
    <text x="920" y="212" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Dev B</text>

    <!-- Dev C -->
    <circle cx="920" cy="280" r="35" fill="#1a1033" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
    <text x="920" y="275" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, -apple-system, sans-serif" font-size="13">Claude</text>
    <text x="920" y="292" text-anchor="middle" fill="#8b7cb8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Dev C</text>
  </g>

  <!-- Decorative scroll elements - subtle ancient feel -->
  <g opacity="0.06" stroke="#a78bfa" fill="none" stroke-width="1">
    <!-- Top left scroll flourish -->
    <path d="M30,30 Q60,30 60,60 Q60,30 90,30"/>
    <path d="M30,35 Q55,35 55,60"/>
    <!-- Bottom right scroll flourish -->
    <path d="M1110,370 Q1140,370 1140,340 Q1140,370 1170,370"/>
    <path d="M1170,365 Q1145,365 1145,340"/>
  </g>

  <!-- Tagline at bottom -->
  <text x="600" y="360" text-anchor="middle" fill="#6b6190" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="3" opacity="0.6">YOUR PRODUCT KNOWLEDGE  ·  EVERY AGENT  ·  ALWAYS</text>
</svg>